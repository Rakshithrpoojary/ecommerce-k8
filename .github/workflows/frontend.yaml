name: Frontend CI


on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_DEFAULT_REGION: ap-south-1
  AWS_ECR_REPO_NAME: ${{ secrets.ECR_REPO1 }}
  AWS_ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
  REPOSITORY_URI: ${{ secrets.ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  frontend-ci:
    runs-on: self-hosted
    # If you use GitHub-hosted runner, change to:
    # runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install packages
        working-directory: frontend
        run: npm install

      - name: Trivy scan filesystem dependencies
        run: |
          trivy fs . > trivy.txt

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectName=ecommercesecond
            -Dsonar.projectKey=ecommercesecond
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker cleanup
        run: docker system prune -f

      - name: Build Docker image
        run: |
          docker build -t $AWS_ECR_REPO_NAME frontend

      - name: Trivy scan Docker image
        run: |
          trivy image $AWS_ECR_REPO_NAME > trivyimage.txt

      - name: Tag Docker image
        run: |
          docker tag $AWS_ECR_REPO_NAME $REPOSITORY_URI/$AWS_ECR_REPO_NAME:${{ github.run_number }}

      - name: Push Docker image to ECR
        run: |
          docker push $REPOSITORY_URI/$AWS_ECR_REPO_NAME:${{ github.run_number }}

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy.txt
            trivyimage.txt